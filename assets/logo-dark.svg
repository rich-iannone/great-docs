<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 240 48" width="240" height="48">
  <defs>
    <linearGradient id="grad1" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#4da3ff;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#5ccdd6;stop-opacity:1" />
    </linearGradient>
  </defs>
  <!-- Book/document icon -->
  <g transform="translate(4, 4)">
    <!-- Back page -->
    <rect x="6" y="2" width="28" height="36" rx="2" ry="2" fill="#5ccdd6" opacity="0.45"/>
    <!-- Front page -->
    <rect x="2" y="5" width="28" height="36" rx="2" ry="2" fill="url(#grad1)"/>
    <!-- Page lines -->
    <line x1="8" y1="14" x2="24" y2="14" stroke="white" stroke-width="1.5" stroke-linecap="round" opacity="0.9"/>
    <line x1="8" y1="19" x2="24" y2="19" stroke="white" stroke-width="1.5" stroke-linecap="round" opacity="0.7"/>
    <line x1="8" y1="24" x2="20" y2="24" stroke="white" stroke-width="1.5" stroke-linecap="round" opacity="0.5"/>
    <!-- Checkmark / "great" accent -->
    <polyline points="19,28 22,31 28,24" fill="none" stroke="white" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" opacity="0.9"/>
  </g>
  <!-- "Great Docs" text -->
  <text x="50" y="33" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, 'Helvetica Neue', Arial, sans-serif" font-size="26" font-weight="700" fill="#e8e8e8">
    <tspan fill="url(#grad1)">Great</tspan><tspan dx="4" fill="#e8e8e8"> Docs</tspan>
  </text>
</svg>
